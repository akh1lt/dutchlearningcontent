<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch A2 Practice Exercises - All 175 Questions</title>
<link rel="stylesheet" href="vars.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);padding:1rem;max-width:900px;margin:0 auto}
h1{font-size:24px;margin-bottom:.5rem;font-weight:600}
.subtitle{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.back{display:inline-block;margin-bottom:1rem;font-size:13px;color:var(--color-text-link);text-decoration:none}
.back:hover{text-decoration:underline}
.search{width:100%;font-size:13px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:1rem}
.stats{font-size:12px;color:var(--color-text-secondary);margin-bottom:1.5rem;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.exercise{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:1rem;background:var(--color-background-primary)}
.exercise.answered{background:var(--color-background-secondary)}
.ex-num{font-size:11px;color:var(--color-text-tertiary);font-weight:500;margin-bottom:.5rem}
.question{font-size:15px;font-weight:500;margin-bottom:1rem;line-height:1.5;color:var(--color-text-primary)}
.question .blank{color:var(--color-text-info);text-decoration:underline;text-decoration-style:dashed}
.options{display:grid;gap:8px;margin-bottom:1rem}
.option{display:flex;align-items:center;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;transition:all .15s}
.option:hover{background:var(--color-background-secondary)}
.option input{margin-right:8px;cursor:pointer}
.option.correct{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.option.incorrect{background:var(--color-background-error);border-color:var(--color-border-error);color:var(--color-text-error)}
.actions{display:flex;gap:8px;margin-bottom:.75rem}
.btn{padding:6px 12px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.btn.primary:hover{opacity:.9}
.feedback{font-size:12px;padding:8px 12px;border-radius:var(--border-radius-md);margin-bottom:.75rem}
.feedback.success{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success)}
.feedback.error{background:var(--color-background-error);color:var(--color-text-error);border:0.5px solid var(--color-border-error)}
.hint{font-size:12px;padding:8px 12px;background:var(--color-background-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);border-left:2px solid var(--color-border-info);line-height:1.5}
.source{font-size:12px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);font-style:italic;line-height:1.5}
.hidden{display:none}
</style>
</head>
<body>
<a href="index.html" class="back">← Back to home</a>
<h1>Dutch A2 Practice Exercises</h1>
<p class="subtitle">All 175 gap-fill exercises. Answer at your own pace - each question has its own submit button.</p>

<input type="text" class="search" id="search" placeholder="Search exercises..." oninput="filterExercises()">

<div class="stats" id="stats">0 / 175 answered</div>

<div id="exercises"></div>

<script src="calude_suggested_sentence_exercises/dutch_exercises.json"></script>
<script>
// Load exercises from external JSON
fetch('calude_suggested_sentence_exercises/dutch_exercises.json')
  .then(response => response.json())
  .then(data => {
    window.EXERCISES = data;
    renderExercises();
  });

let answered = new Set();

function renderExercises() {
  if (!window.EXERCISES) return;

  const container = document.getElementById('exercises');
  const searchTerm = document.getElementById('search').value.toLowerCase();

  const filtered = window.EXERCISES.map((ex, idx) => ({ex, idx})).filter(({ex}) => {
    if (!searchTerm) return true;
    return ex.q.toLowerCase().includes(searchTerm) ||
           ex.hint.toLowerCase().includes(searchTerm) ||
           ex.source.toLowerCase().includes(searchTerm);
  });

  container.innerHTML = filtered.map(({ex, idx}) => {
    const options = [ex.correct, ...ex.distractors].sort(() => Math.random() - 0.5);
    const isAnswered = answered.has(idx);

    return `
      <div class="exercise ${isAnswered ? 'answered' : ''}" id="ex-${idx}">
        <div class="ex-num">Question ${idx + 1} of ${window.EXERCISES.length}</div>
        <div class="question">${ex.q.replace('___', '<span class="blank">___</span>')}</div>
        <div class="options" id="options-${idx}">
          ${options.map((opt, i) => `
            <label class="option" id="opt-${idx}-${i}">
              <input type="radio" name="q-${idx}" value="${opt}" onchange="selectOption(${idx})">
              <span>${opt}</span>
            </label>
          `).join('')}
        </div>
        <div class="actions">
          <button class="btn primary" onclick="checkAnswer(${idx})" id="check-${idx}">Check Answer</button>
          <button class="btn" onclick="showHint(${idx})" id="hint-btn-${idx}">Show Hint</button>
        </div>
        <div class="hint hidden" id="hint-${idx}">💡 ${ex.hint}</div>
        <div class="feedback hidden" id="feedback-${idx}"></div>
        <div class="source hidden" id="source-${idx}">📝 Full sentence: ${ex.source}</div>
      </div>
    `;
  }).join('');

  updateStats();
}

function selectOption(idx) {
  // Just marks that an option was selected
}

function checkAnswer(idx) {
  const ex = window.EXERCISES[idx];
  const selected = document.querySelector(`input[name="q-${idx}"]:checked`);

  if (!selected) {
    alert('Please select an answer first!');
    return;
  }

  const userAnswer = selected.value;
  const isCorrect = userAnswer === ex.correct;

  // Mark as answered
  answered.add(idx);
  document.getElementById(`ex-${idx}`).classList.add('answered');

  // Show feedback
  const feedback = document.getElementById(`feedback-${idx}`);
  feedback.classList.remove('hidden', 'success', 'error');

  if (isCorrect) {
    feedback.classList.add('success');
    feedback.textContent = '✓ Correct!';
  } else {
    feedback.classList.add('error');
    feedback.textContent = `✗ Wrong. The correct answer is: ${ex.correct}`;
  }

  // Highlight correct/incorrect options
  const options = document.querySelectorAll(`#options-${idx} .option`);
  options.forEach(opt => {
    const input = opt.querySelector('input');
    if (input.value === ex.correct) {
      opt.classList.add('correct');
    } else if (input.value === userAnswer && !isCorrect) {
      opt.classList.add('incorrect');
    }
    input.disabled = true;
  });

  // Show source
  document.getElementById(`source-${idx}`).classList.remove('hidden');

  // Disable check button
  document.getElementById(`check-${idx}`).disabled = true;
  document.getElementById(`check-${idx}`).textContent = 'Answered';

  updateStats();
}

function showHint(idx) {
  document.getElementById(`hint-${idx}`).classList.remove('hidden');
  document.getElementById(`hint-btn-${idx}`).disabled = true;
}

function updateStats() {
  document.getElementById('stats').textContent = `${answered.size} / ${window.EXERCISES.length} answered`;
}

function filterExercises() {
  renderExercises();
}
</script>
</body>
</html>
