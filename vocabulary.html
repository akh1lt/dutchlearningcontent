<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch Vocabulary — A2 Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-gradient-start: #1a1a2e;
    --bg-gradient-end: #16213e;
    --text-primary: #e0e0e0;
    --text-secondary: #b0b0b0;
    --text-muted: #a0a0a0;
    --accent-primary: #667eea;
    --accent-secondary: #764ba2;
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-border: rgba(255, 255, 255, 0.1);
    --card-hover-bg: rgba(102, 126, 234, 0.15);
    --input-bg: rgba(255, 255, 255, 0.08);
    --input-border: rgba(255, 255, 255, 0.2);
    --shadow-color: rgba(0, 0, 0, 0.3);
    --tag-noun-bg: rgba(102, 126, 234, 0.2);
    --tag-noun-text: #667eea;
    --tag-verb-bg: rgba(74, 222, 128, 0.2);
    --tag-verb-text: #4ade80;
    --tag-adj-bg: rgba(251, 191, 36, 0.2);
    --tag-adj-text: #fbbf24;
    --tag-adv-bg: rgba(168, 85, 247, 0.2);
    --tag-adv-text: #a855f7;
    --tag-other-bg: rgba(236, 72, 153, 0.2);
    --tag-other-text: #ec4899;
    /* Cluster colors */
    --cluster-red: #ef4444;
    --cluster-red-bg: rgba(239, 68, 68, 0.08);
    --cluster-red-border: rgba(239, 68, 68, 0.25);
    --cluster-yellow: #eab308;
    --cluster-yellow-bg: rgba(234, 179, 8, 0.08);
    --cluster-yellow-border: rgba(234, 179, 8, 0.25);
    --cluster-green: #22c55e;
    --cluster-green-bg: rgba(34, 197, 94, 0.08);
    --cluster-green-border: rgba(34, 197, 94, 0.25);
  }

  body.light-mode {
    --bg-gradient-start: #f5f2eb;
    --bg-gradient-end: #f5f2eb;
    --text-primary: #000000;
    --text-secondary: #1a1a18;
    --text-muted: #3a3a38;
    --accent-primary: #c84b1f;
    --accent-secondary: #2563a8;
    --card-bg: #fffef9;
    --card-border: #d8d4ca;
    --card-hover-bg: rgba(200, 75, 31, 0.05);
    --input-bg: #ffffff;
    --input-border: #d8d4ca;
    --shadow-color: rgba(0, 0, 0, 0.1);
    --tag-noun-bg: #dbeafe;
    --tag-noun-text: #1e40af;
    --tag-verb-bg: #dcfce7;
    --tag-verb-text: #166534;
    --tag-adj-bg: #fef3c7;
    --tag-adj-text: #92400e;
    --tag-adv-bg: #f3e8ff;
    --tag-adv-text: #6b21a8;
    --tag-other-bg: #fce7f3;
    --tag-other-text: #9d174d;
    --cluster-red-bg: rgba(239, 68, 68, 0.06);
    --cluster-red-border: rgba(239, 68, 68, 0.3);
    --cluster-yellow-bg: rgba(234, 179, 8, 0.06);
    --cluster-yellow-border: rgba(234, 179, 8, 0.3);
    --cluster-green-bg: rgba(34, 197, 94, 0.06);
    --cluster-green-border: rgba(34, 197, 94, 0.3);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-primary);
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    padding: 20px;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body.light-mode {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header {
    margin: 20px 0 30px;
    padding: 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 10px 30px var(--shadow-color);
    position: relative;
  }
  header h1 { font-size: 2.2rem; font-weight: 600; margin-bottom: 0.5rem; }
  header p { font-size: 1rem; opacity: 0.9; }

  .theme-toggle, .home-button {
    position: absolute;
    top: 20px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 25px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-weight: 500;
    text-decoration: none;
  }
  .theme-toggle { right: 20px; }
  .home-button { left: 20px; }
  .theme-toggle:hover, .home-button:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
  .theme-toggle:active, .home-button:active { transform: scale(0.95); }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 10px 30px var(--shadow-color);
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .progress-stat {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .progress-stat .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-red { background: var(--cluster-red); }
  .dot-yellow { background: var(--cluster-yellow); }
  .dot-green { background: var(--cluster-green); }
  .progress-track {
    height: 10px;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
    background: rgba(128,128,128,0.15);
  }
  .progress-seg {
    height: 100%;
    transition: width 0.5s ease;
  }
  .seg-red { background: var(--cluster-red); }
  .seg-yellow { background: var(--cluster-yellow); }
  .seg-green { background: var(--cluster-green); }

  /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .controls input, .controls select {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    border-radius: 8px;
    color: var(--text-primary);
    transition: all 0.3s ease;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus, .controls select:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }
  .controls input::placeholder { color: var(--text-muted); }
  .controls select { min-width: 150px; cursor: pointer; }
  body.light-mode .controls select option { background: white; color: #1a1a2e; }
  body:not(.light-mode) .controls select option { background: #1a1a2e; color: #e0e0e0; }

  .reset-btn {
    background: rgba(239, 68, 68, 0.15);
    color: var(--cluster-red);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reset-btn:hover { background: rgba(239, 68, 68, 0.25); }

  /* Cluster sections */
  .vote-cluster {
    margin-bottom: 2rem;
  }
  .cluster-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 0.75rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .cluster-header:hover { filter: brightness(1.1); }
  .cluster-header .cluster-icon { font-size: 1.1rem; }
  .cluster-header .cluster-title { font-weight: 700; font-size: 1rem; }
  .cluster-header .cluster-count {
    font-size: 0.85rem;
    opacity: 0.8;
    font-weight: 500;
    margin-left: auto;
  }
  .cluster-header .collapse-arrow {
    font-size: 0.7rem;
    transition: transform 0.3s;
    margin-left: 0.5rem;
  }
  .cluster-header.collapsed .collapse-arrow { transform: rotate(-90deg); }

  .cluster-header-red {
    background: var(--cluster-red-bg);
    border: 1px solid var(--cluster-red-border);
    color: var(--cluster-red);
  }
  .cluster-header-yellow {
    background: var(--cluster-yellow-bg);
    border: 1px solid var(--cluster-yellow-border);
    color: var(--cluster-yellow);
  }
  .cluster-header-green {
    background: var(--cluster-green-bg);
    border: 1px solid var(--cluster-green-border);
    color: var(--cluster-green);
  }

  /* Card container */
  .card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.25rem 0;
    min-height: 30px;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    overflow: hidden;
  }
  .card-container.collapsed-content {
    max-height: 0 !important;
    opacity: 0;
    padding: 0;
    margin: 0;
  }

  /* Vocab card - compact chip style */
  .vocab-card {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    cursor: pointer;
    transition: all 0.25s ease;
    font-size: 0.85rem;
    position: relative;
    max-width: 100%;
    flex-shrink: 0;
  }
  .vocab-card:hover, .vocab-card:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--shadow-color);
    z-index: 2;
  }
  .vocab-card .dutch {
    font-weight: 600;
    color: var(--accent-secondary);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .vocab-card .sep {
    color: var(--text-muted);
    font-size: 0.7rem;
  }
  .vocab-card .eng {
    color: var(--text-secondary);
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  /* Border color by cluster */
  .vocab-card.vote-needs-review { border-color: var(--cluster-red-border); }
  .vocab-card.vote-not-reviewed { border-color: var(--cluster-yellow-border); }
  .vocab-card.vote-mastered { border-color: var(--cluster-green-border); }

  /* Vote buttons on hover */
  .vote-btns {
    display: none;
    gap: 0.15rem;
    margin-left: 0.25rem;
    flex-shrink: 0;
  }
  .vocab-card:hover .vote-btns,
  .vocab-card.expanded .vote-btns {
    display: inline-flex;
  }
  .vote-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.1rem 0.2rem;
    border-radius: 4px;
    transition: all 0.15s;
    line-height: 1;
    opacity: 0.6;
  }
  .vote-btn:hover { opacity: 1; transform: scale(1.2); }
  .vote-btn-down:hover { background: rgba(239, 68, 68, 0.2); }
  .vote-btn-up:hover { background: rgba(34, 197, 94, 0.2); }

  /* Expanded card overlay */
  .vocab-card.expanded {
    position: relative;
    z-index: 10;
    flex-direction: column;
    align-items: flex-start;
    padding: 0.6rem 0.8rem;
    background: var(--card-bg);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px var(--shadow-color);
    min-width: 240px;
    max-width: 320px;
    gap: 0.3rem;
  }
  .vocab-card.expanded .card-top {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    width: 100%;
  }
  .vocab-card.expanded .eng {
    max-width: none;
    white-space: normal;
  }
  .card-details {
    display: none;
    flex-direction: column;
    gap: 0.25rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
    width: 100%;
    padding-top: 0.3rem;
    border-top: 1px solid var(--card-border);
  }
  .vocab-card.expanded .card-details { display: flex; }
  .card-detail-row {
    display: flex;
    gap: 0.4rem;
    align-items: baseline;
  }
  .card-detail-label {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    min-width: 55px;
    flex-shrink: 0;
  }

  /* POS badges */
  .pos-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pos-noun { background: var(--tag-noun-bg); color: var(--tag-noun-text); border: 1px solid var(--tag-noun-text); }
  .pos-verb { background: var(--tag-verb-bg); color: var(--tag-verb-text); border: 1px solid var(--tag-verb-text); }
  .pos-adj { background: var(--tag-adj-bg); color: var(--tag-adj-text); border: 1px solid var(--tag-adj-text); }
  .pos-adv { background: var(--tag-adv-bg); color: var(--tag-adv-text); border: 1px solid var(--tag-adv-text); }
  .pos-other { background: var(--tag-other-bg); color: var(--tag-other-text); border: 1px solid var(--tag-other-text); }

  .cluster-badge {
    font-size: 0.7rem;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    color: var(--text-secondary);
    background: var(--card-hover-bg);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--card-border);
  }

  .hidden { display: none !important; }

  /* Verb conjugation details */
  .verb-detail-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.15rem 0.6rem;
    font-size: 0.78rem;
    width: 100%;
  }
  .verb-detail-grid .vd-label {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .verb-detail-grid .vd-value {
    color: var(--text-secondary);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 0.78rem;
  }
  .verb-note {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-style: italic;
    border-top: 1px solid var(--card-border);
    padding-top: 0.25rem;
    margin-top: 0.15rem;
    line-height: 1.4;
  }
  .vocab-card.expanded.verb-card {
    min-width: 280px;
    max-width: 380px;
  }
  .verb-pat-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
    background: var(--tag-verb-bg);
    color: var(--tag-verb-text);
    border: 1px solid var(--tag-verb-text);
  }

  /* Touch devices: always show vote buttons */
  @media (hover: none) {
    .vote-btns { display: inline-flex !important; }
  }

  @media (max-width: 768px) {
    header { padding: 20px 15px; }
    header h1 { font-size: 1.5rem; padding: 0 70px; }
    header p { font-size: 0.85rem; }
    .theme-toggle, .home-button { padding: 6px 10px; font-size: 1rem; top: 15px; }
    .theme-toggle { right: 15px; }
    .home-button { left: 15px; }
    .theme-toggle span:last-child, .home-button span:last-child { display: none; }
    .controls { flex-direction: column; }
    .controls input, .controls select { width: 100%; min-width: 100%; }
    .vocab-card .eng { max-width: 120px; }
    .vocab-card.expanded { min-width: 200px; max-width: calc(100vw - 60px); }
    .progress-stats { gap: 0.3rem; }
    .progress-stat { font-size: 0.75rem; }
  }
</style>
</head>

<div class="container">

<header>
  <a href="index.html" class="home-button" aria-label="Back to home">
    <span>&#127968;</span>
    <span>Home</span>
  </a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">&#9728;&#65039;</span>
    <span id="themeText">Light</span>
  </button>
  <h1>&#127475;&#127473; Dutch Vocabulary — A2 Reference</h1>
  <p>2,115 words · Interactive Voting · Track Your Progress</p>
</header>

<!-- Progress indicator -->
<div class="progress-bar-wrap">
  <div class="progress-stats">
    <div class="progress-stat"><span class="dot dot-red"></span> Needs Review: <span id="countRed">0</span></div>
    <div class="progress-stat"><span class="dot dot-yellow"></span> Not Reviewed: <span id="countYellow">2115</span></div>
    <div class="progress-stat"><span class="dot dot-green"></span> Mastered: <span id="countGreen">0</span></div>
  </div>
  <div class="progress-track">
    <div class="progress-seg seg-red" id="segRed" style="width:0%"></div>
    <div class="progress-seg seg-yellow" id="segYellow" style="width:100%"></div>
    <div class="progress-seg seg-green" id="segGreen" style="width:0%"></div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <input type="text" id="searchInput" placeholder="Search Dutch or English...">
  <select id="posFilter">
    <option value="">All parts of speech</option>
    <option value="noun">Noun</option>
    <option value="verb">Verb</option>
    <option value="adj">Adjective</option>
    <option value="adv">Adverb</option>
    <option value="other">Other</option>
  </select>
  <select id="clusterFilter">
    <option value="">All clusters</option>
  </select>
  <button class="reset-btn" id="resetBtn">Reset All Votes</button>
</div>

<!-- Vote clusters -->
<div id="voteArea">
  <div class="vote-cluster" id="cluster-needs-review">
    <div class="cluster-header cluster-header-red" id="header-needs-review">
      <span class="cluster-icon">&#10060;</span>
      <span class="cluster-title">Needs Review</span>
      <span class="cluster-count" id="count-needs-review">(0)</span>
      <span class="collapse-arrow">&#9660;</span>
    </div>
    <div class="card-container" id="cards-needs-review"></div>
  </div>

  <div class="vote-cluster" id="cluster-not-reviewed">
    <div class="cluster-header cluster-header-yellow" id="header-not-reviewed">
      <span class="cluster-icon">&#9898;</span>
      <span class="cluster-title">Not Yet Reviewed</span>
      <span class="cluster-count" id="count-not-reviewed">(2115)</span>
      <span class="collapse-arrow">&#9660;</span>
    </div>
    <div class="card-container" id="cards-not-reviewed"></div>
  </div>

  <div class="vote-cluster" id="cluster-mastered">
    <div class="cluster-header cluster-header-green" id="header-mastered">
      <span class="cluster-icon">&#9989;</span>
      <span class="cluster-title">Mastered</span>
      <span class="cluster-count" id="count-mastered">(0)</span>
      <span class="collapse-arrow">&#9660;</span>
    </div>
    <div class="card-container" id="cards-mastered"></div>
  </div>
</div>

<!-- Verb Conjugation Section -->
<div style="margin-top: 3rem;">
  <h2 style="color: var(--text-primary); font-size: 1.5rem; margin-bottom: 1rem; padding: 0 0.5rem;">
    &#128260; Verb Conjugation Practice
  </h2>
  <div id="verb-clusters"></div>
</div>

<!-- Category Clusters Section -->
<div style="margin-top: 3rem;">
  <h2 style="color: var(--text-primary); font-size: 1.5rem; margin-bottom: 1rem; padding: 0 0.5rem;">
    📚 Browse by Category
  </h2>
  <div id="category-clusters"></div>
</div>

</div>

const VERB_PAT_NAMES = {
  aux: "Auxiliaries",
  modal: "Modal Verbs",
  irr: "Irregular",
  te: "Regular -te",
  de: "Regular -de",
  sep: "Separable"
};

const VERB_PAT_ORDER = ["aux", "modal", "irr", "te", "de", "sep"];

// VOTING SYSTEM
// ══════════════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'dutchvocab-votes';
const POS_CLASS = { noun:'pos-noun', verb:'pos-verb', adj:'pos-adj', adv:'pos-adv', other:'pos-other' };

// Vote states: 'needs-review', 'not-reviewed', 'mastered'
let votes = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) votes = JSON.parse(saved);
} catch(e) { votes = {}; }

function saveVotes() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(votes)); } catch(e) {}
}

// ── Verb Votes (separate storage) ──
const VERB_VOTE_KEY = 'dutchverb-votes';
let verbVotes = {};
try {
  const saved = localStorage.getItem(VERB_VOTE_KEY);
  if (saved) verbVotes = JSON.parse(saved);
} catch(e) { verbVotes = {}; }

function saveVerbVotes() {
  try { localStorage.setItem(VERB_VOTE_KEY, JSON.stringify(verbVotes)); } catch(e) {}
}

function getVerbVote(inf) {
  return verbVotes[inf] || 'not-reviewed';
}

function setVerbVote(inf, state) {
  if (state === 'not-reviewed') {
    delete verbVotes[inf];
  } else {
    verbVotes[inf] = state;
  }
  saveVerbVotes();
}

function getVote(dutch) {
  return votes[dutch] || 'not-reviewed';
}

function setVote(dutch, state) {
  if (state === 'not-reviewed') {
    delete votes[dutch];
  } else {
    votes[dutch] = state;
  }
  saveVotes();
}

// Populate cluster filter
const clusterSelect = document.getElementById('clusterFilter');
const clusterSet = [...new Set(WORDS.map(w => w[3]))].sort();
clusterSet.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = CLUSTER_META[c] || c;
  clusterSelect.appendChild(opt);
});

// Card creation
function createCard(word) {
  const [dutch, eng, pos, cluster] = word;
  const vote = getVote(dutch);
  const card = document.createElement('div');
  card.className = `vocab-card vote-${vote}`;
  card.tabIndex = 0;
  card.dataset.dutch = dutch;
  card.dataset.pos = pos;
  card.dataset.cluster = cluster;

  const clusterLabel = CLUSTER_META[cluster] || cluster;

  card.innerHTML = `
    <div class="card-top">
      <span class="dutch">${dutch}</span>
      <span class="vote-btns">
        <button class="vote-btn vote-btn-down" title="Needs review" aria-label="Mark needs review">&#128078;</button>
        <button class="vote-btn vote-btn-up" title="Mastered" aria-label="Mark mastered">&#128077;</button>
      </span>
    </div>
    <div class="card-details">
      <div class="card-detail-row">
        <span class="card-detail-label">English</span>
        <span>${eng}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">POS</span>
        <span class="pos-badge ${POS_CLASS[pos] || 'pos-other'}">${pos}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">Cluster</span>
        <span class="cluster-badge">${clusterLabel}</span>
      </div>
    </div>
  `;

  // Expand/collapse on click
  card.addEventListener('click', (e) => {
    if (e.target.closest('.vote-btn')) return;
    // Collapse any other expanded card
    const prev = document.querySelector('.vocab-card.expanded');
    if (prev && prev !== card) prev.classList.remove('expanded');
    card.classList.toggle('expanded');
  });

  // Vote buttons
  card.querySelector('.vote-btn-down').addEventListener('click', (e) => {
    e.stopPropagation();
    const current = getVote(dutch);
    if (current === 'needs-review') {
      // Toggle back to not-reviewed
      setVote(dutch, 'not-reviewed');
    } else {
      setVote(dutch, 'needs-review');
    }
    card.classList.remove('expanded');
    renderCards();
  });

  card.querySelector('.vote-btn-up').addEventListener('click', (e) => {
    e.stopPropagation();
    const current = getVote(dutch);
    if (current === 'mastered') {
      // Toggle back to not-reviewed
      setVote(dutch, 'not-reviewed');
    } else {
      setVote(dutch, 'mastered');
    }
    card.classList.remove('expanded');
    renderCards();
  });

  return card;
}

// Get current filter state
function getFilteredWords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const pos = document.getElementById('posFilter').value;
  const cluster = document.getElementById('clusterFilter').value;
  return WORDS.filter(([dutch, eng, p, c]) => {
    const matchQ = !q || dutch.toLowerCase().includes(q) || eng.toLowerCase().includes(q);
    const matchPos = !pos || p === pos;
    const matchCluster = !cluster || c === cluster;
    return matchQ && matchPos && matchCluster;
  });
}

// Render all cards into clusters
function renderCards() {
  const filtered = getFilteredWords();
  const containers = {
    'needs-review': document.getElementById('cards-needs-review'),
    'not-reviewed': document.getElementById('cards-not-reviewed'),
    'mastered': document.getElementById('cards-mastered')
  };

  // Clear
  Object.values(containers).forEach(c => c.innerHTML = '');

  const counts = { 'needs-review': 0, 'not-reviewed': 0, 'mastered': 0 };

  filtered.forEach(word => {
    const vote = getVote(word[0]);
    const card = createCard(word);
    containers[vote].appendChild(card);
    counts[vote]++;
  });

  // Update counts in headers
  document.getElementById('count-needs-review').textContent = `(${counts['needs-review']})`;
  document.getElementById('count-not-reviewed').textContent = `(${counts['not-reviewed']})`;
  document.getElementById('count-mastered').textContent = `(${counts['mastered']})`;

  // Update progress bar (always use full WORDS count for progress)
  updateProgress();

  // Update category clusters to remove voted words
  renderCategoryClusters();

  // Update verb conjugation clusters
  renderVerbClusters();
}

function updateProgress() {
  const total = WORDS.length;
  let r = 0, y = 0, g = 0;
  WORDS.forEach(([dutch]) => {
    const v = getVote(dutch);
    if (v === 'needs-review') r++;
    else if (v === 'mastered') g++;
    else y++;
  });

  document.getElementById('countRed').textContent = r;
  document.getElementById('countYellow').textContent = y;
  document.getElementById('countGreen').textContent = g;

  const pR = total ? (r / total * 100) : 0;
  const pY = total ? (y / total * 100) : 0;
  const pG = total ? (g / total * 100) : 0;

  document.getElementById('segRed').style.width = pR + '%';
  document.getElementById('segYellow').style.width = pY + '%';
  document.getElementById('segGreen').style.width = pG + '%';
}

// Track which category clusters are expanded
const expandedCategories = new Set();

// Render category-based clusters
function renderCategoryClusters() {
  const categoryContainer = document.getElementById('category-clusters');
  categoryContainer.innerHTML = ''; // Clear existing

  // Group words by category (only show not-reviewed words, exclude verb conjugation clusters)
  const byCategory = {};
  WORDS.forEach(word => {
    const vote = getVote(word[0]);
    if (vote !== 'not-reviewed') return; // Skip voted words

    const category = word[3];
    // Skip verb conjugation clusters (ending with _irr)
    if (category.endsWith('_irr')) return;

    if (!byCategory[category]) byCategory[category] = [];
    byCategory[category].push(word);
  });

  // Sort categories alphabetically
  const sortedCategories = Object.keys(byCategory).sort((a, b) => {
    const nameA = CLUSTER_META[a] || a;
    const nameB = CLUSTER_META[b] || b;
    return nameA.localeCompare(nameB);
  });

  // Create cluster for each category (skip if empty)
  sortedCategories.forEach(category => {
    const words = byCategory[category];
    if (words.length === 0) return; // Skip empty categories

    const categoryName = CLUSTER_META[category] || category;

    const clusterDiv = document.createElement('div');
    clusterDiv.className = 'vote-cluster';
    clusterDiv.style.marginBottom = '1.5rem';

    const header = document.createElement('div');
    header.className = 'cluster-header';
    header.style.background = 'var(--card-bg)';
    header.style.border = '1px solid var(--card-border)';
    header.style.color = 'var(--accent-primary)';
    header.dataset.category = category; // Store category for tracking
    header.innerHTML = `
      <span class="cluster-icon">📁</span>
      <span class="cluster-title">${categoryName}</span>
      <span class="cluster-count">(${words.length})</span>
      <span class="collapse-arrow">&#9660;</span>
    `;

    const cardContainer = document.createElement('div');
    cardContainer.className = 'card-container';
    cardContainer.dataset.category = category;

    words.forEach(word => {
      const card = createCard(word);
      cardContainer.appendChild(card);
    });

    // Toggle collapse/expand
    header.addEventListener('click', () => {
      header.classList.toggle('collapsed');
      cardContainer.classList.toggle('collapsed-content');

      // Track expanded state
      if (header.classList.contains('collapsed')) {
        expandedCategories.delete(category);
      } else {
        expandedCategories.add(category);
      }
    });

    // Restore previous expanded state or start collapsed
    if (expandedCategories.has(category)) {
      // Keep it expanded
      header.classList.remove('collapsed');
      cardContainer.classList.remove('collapsed-content');
    } else {
      // Start collapsed
      header.classList.add('collapsed');
      cardContainer.classList.add('collapsed-content');
    }

    clusterDiv.appendChild(header);
    clusterDiv.appendChild(cardContainer);
    categoryContainer.appendChild(clusterDiv);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// VERB CONJUGATION CLUSTERS — Expanded Individual Forms
// ══════════════════════════════════════════════════════════════════════════════

const expandedVerbClusters = new Set();

const FORM_TYPE_LABELS = {
  'infinitive': 'Infinitive',
  'present-ik': 'Present (ik)',
  'present-jij': 'Present (jij)',
  'present-hij': 'Present (hij)',
  'present-wij': 'Present (wij)',
  'imperfect-ik': 'Imperfect (ik)',
  'imperfect-wij': 'Imperfect (wij)',
  'participle': 'Past Participle',
  'imperative': 'Imperative'
};

function isPlaceholder(val) {
  return !val || val === '\u2014' || val === '—' || val === '__________';
}

function expandVerbsToForms() {
  const forms = [];

  VERBS.forEach(verb => {
    const base = {
      infinitive: verb.inf,
      pattern: verb.pat,
      auxiliaryNeeded: verb.aux,
      note: verb.note || ''
    };

    // Infinitive card
    forms.push({
      dutch: verb.inf,
      english: `${verb.en} (infinitive)`,
      formType: 'infinitive',
      ...base
    });

    // Present tense forms
    const presPronouns = { ik: 'ik', jij: 'jij', hij: 'hij', wij: 'wij' };
    Object.entries(presPronouns).forEach(([key, pronoun]) => {
      const val = verb.pres[key];
      if (isPlaceholder(val)) return;
      // Handle slash variants like "kan/kunt"
      const variants = val.split('/').map(v => v.trim());
      variants.forEach(variant => {
        forms.push({
          dutch: variant,
          english: `${verb.en} (${pronoun}, present)`,
          formType: `present-${key}`,
          ...base
        });
      });
    });

    // Imperfect forms
    const impPronouns = { ik: 'ik', wij: 'wij' };
    Object.entries(impPronouns).forEach(([key, pronoun]) => {
      const val = verb.imp[key];
      if (isPlaceholder(val)) return;
      const variants = val.split('/').map(v => v.trim());
      variants.forEach(variant => {
        forms.push({
          dutch: variant,
          english: `${verb.en} (${pronoun}, imperfectum)`,
          formType: `imperfect-${key}`,
          ...base
        });
      });
    });

    // Past participle
    if (!isPlaceholder(verb.pp)) {
      forms.push({
        dutch: verb.pp,
        english: `${verb.en.replace(/^to /, '')} (past participle)`,
        formType: 'participle',
        ...base
      });
    }

    // Imperative
    if (!isPlaceholder(verb.impv)) {
      forms.push({
        dutch: verb.impv,
        english: `${verb.en.replace(/^to /, '')}! (imperative)`,
        formType: 'imperative',
        ...base
      });
    }
  });

  return forms;
}

const EXPANDED_VERB_FORMS = expandVerbsToForms();

function createVerbFormCard(form) {
  // Use a composite key: dutch form + infinitive + formType for unique voting
  const voteKey = `${form.dutch}__${form.infinitive}__${form.formType}`;
  const vote = getVerbVote(voteKey);
  const card = document.createElement('div');
  card.className = `vocab-card verb-card vote-${vote}`;
  card.tabIndex = 0;
  card.dataset.dutch = form.dutch;
  card.dataset.infinitive = form.infinitive;
  card.dataset.formtype = form.formType;

  const patLabel = VERB_PAT_NAMES[form.pattern] || form.pattern;
  const formLabel = FORM_TYPE_LABELS[form.formType] || form.formType;

  card.innerHTML = `
    <div class="card-top">
      <span class="dutch">${form.dutch}</span>
      <span class="vote-btns">
        <button class="vote-btn vote-btn-down" title="Needs review" aria-label="Mark needs review">&#128078;</button>
        <button class="vote-btn vote-btn-up" title="Mastered" aria-label="Mark mastered">&#128077;</button>
      </span>
    </div>
    <div class="card-details">
      <div class="card-detail-row">
        <span class="card-detail-label">English</span>
        <span>${form.english}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">Infinitive</span>
        <span style="font-weight:600">${form.infinitive}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">Form</span>
        <span>${formLabel}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">Auxiliary</span>
        <span>${form.auxiliaryNeeded}</span>
      </div>
      <div class="card-detail-row">
        <span class="card-detail-label">Pattern</span>
        <span class="verb-pat-badge">${patLabel}</span>
      </div>
      ${form.note ? `<div class="verb-note">${form.note}</div>` : ''}
    </div>
  `;

  // Expand/collapse
  card.addEventListener('click', (e) => {
    if (e.target.closest('.vote-btn')) return;
    const prev = document.querySelector('.vocab-card.expanded');
    if (prev && prev !== card) prev.classList.remove('expanded');
    card.classList.toggle('expanded');
  });

  // Vote buttons
  card.querySelector('.vote-btn-down').addEventListener('click', (e) => {
    e.stopPropagation();
    const current = getVerbVote(voteKey);
    setVerbVote(voteKey, current === 'needs-review' ? 'not-reviewed' : 'needs-review');
    card.classList.remove('expanded');
    renderVerbClusters();
  });

  card.querySelector('.vote-btn-up').addEventListener('click', (e) => {
    e.stopPropagation();
    const current = getVerbVote(voteKey);
    setVerbVote(voteKey, current === 'mastered' ? 'not-reviewed' : 'mastered');
    card.classList.remove('expanded');
    renderVerbClusters();
  });

  return card;
}

function getVerbFormVoteKey(form) {
  return `${form.dutch}__${form.infinitive}__${form.formType}`;
}

function renderVerbClusters() {
  const container = document.getElementById('verb-clusters');
  container.innerHTML = '';

  const q = document.getElementById('searchInput').value.toLowerCase();

  // Filter forms by search query and vote status
  const filtered = EXPANDED_VERB_FORMS.filter(f => {
    const vote = getVerbVote(getVerbFormVoteKey(f));
    if (vote !== 'not-reviewed') return false; // Skip voted forms

    if (!q) return true; // No search query, include all not-reviewed

    return f.dutch.toLowerCase().includes(q) ||
           f.english.toLowerCase().includes(q) ||
           f.infinitive.toLowerCase().includes(q);
  });

  // Group by pattern
  const byPat = {};
  filtered.forEach(form => {
    if (!byPat[form.pattern]) byPat[form.pattern] = [];
    byPat[form.pattern].push(form);
  });

  // Render in defined order
  VERB_PAT_ORDER.forEach(pat => {
    const forms = byPat[pat];
    if (!forms || forms.length === 0) return;

    const patName = VERB_PAT_NAMES[pat] || pat;
    const clusterKey = 'verb-' + pat;

    const clusterDiv = document.createElement('div');
    clusterDiv.className = 'vote-cluster';
    clusterDiv.style.marginBottom = '1.5rem';

    const header = document.createElement('div');
    header.className = 'cluster-header';
    header.style.background = 'var(--card-bg)';
    header.style.border = '1px solid var(--card-border)';
    header.style.color = 'var(--accent-primary)';
    header.dataset.category = clusterKey;

    // Count votes within this pattern
    let nr = 0, ny = 0, ng = 0;
    forms.forEach(f => {
      const vote = getVerbVote(getVerbFormVoteKey(f));
      if (vote === 'needs-review') nr++;
      else if (vote === 'mastered') ng++;
      else ny++;
    });

    const countParts = [];
    if (nr > 0) countParts.push(`<span style="color:var(--cluster-red)">${nr}&#10060;</span>`);
    if (ny > 0) countParts.push(`<span style="color:var(--cluster-yellow)">${ny}&#9898;</span>`);
    if (ng > 0) countParts.push(`<span style="color:var(--cluster-green)">${ng}&#9989;</span>`);

    header.innerHTML = `
      <span class="cluster-icon">&#128260;</span>
      <span class="cluster-title">${patName}</span>
      <span class="cluster-count">(${forms.length}) ${countParts.join(' ')}</span>
      <span class="collapse-arrow">&#9660;</span>
    `;

    const cardContainer = document.createElement('div');
    cardContainer.className = 'card-container';

    forms.forEach(form => {
      cardContainer.appendChild(createVerbFormCard(form));
    });

    header.addEventListener('click', () => {
      header.classList.toggle('collapsed');
      cardContainer.classList.toggle('collapsed-content');
      if (header.classList.contains('collapsed')) {
        expandedVerbClusters.delete(clusterKey);
      } else {
        expandedVerbClusters.add(clusterKey);
      }
    });

    // Restore state or default to collapsed
    if (expandedVerbClusters.has(clusterKey)) {
      header.classList.remove('collapsed');
      cardContainer.classList.remove('collapsed-content');
    } else {
      header.classList.add('collapsed');
      cardContainer.classList.add('collapsed-content');
    }

    clusterDiv.appendChild(header);
    clusterDiv.appendChild(cardContainer);
    container.appendChild(clusterDiv);
  });
}

// Collapse/expand cluster sections
document.querySelectorAll('.cluster-header').forEach(header => {
  header.addEventListener('click', () => {
    header.classList.toggle('collapsed');
    const container = header.nextElementSibling;
    container.classList.toggle('collapsed-content');
  });
});

// Filters
document.getElementById('searchInput').addEventListener('input', renderCards);
document.getElementById('posFilter').addEventListener('change', renderCards);
document.getElementById('clusterFilter').addEventListener('change', renderCards);

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all votes? This cannot be undone.')) {
    votes = {};
    saveVotes();
    verbVotes = {};
    saveVerbVotes();
    renderCards();
  }
});

// Close expanded card when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.vocab-card')) {
    const expanded = document.querySelector('.vocab-card.expanded');
    if (expanded) expanded.classList.remove('expanded');
  }
});

// Initial render
renderCards();
renderCategoryClusters();
renderVerbClusters();

</script>
