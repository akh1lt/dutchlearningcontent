<title>Dutch Vocabulary — A2 Reference</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* CSS Variables for theming */
  :root {
    --bg-gradient-start: #1a1a2e;
    --bg-gradient-end: #16213e;
    --text-primary: #e0e0e0;
    --text-secondary: #b0b0b0;
    --text-muted: #a0a0a0;
    --accent-primary: #667eea;
    --accent-secondary: #764ba2;
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-border: rgba(255, 255, 255, 0.1);
    --card-hover-bg: rgba(102, 126, 234, 0.15);
    --input-bg: rgba(255, 255, 255, 0.08);
    --input-border: rgba(255, 255, 255, 0.2);
    --table-header-bg: rgba(102, 126, 234, 0.2);
    --table-row-even: rgba(255, 255, 255, 0.02);
    --table-border: rgba(255, 255, 255, 0.05);
    --shadow-color: rgba(0, 0, 0, 0.3);

    /* POS badge colors - dark mode */
    --tag-noun-bg: rgba(102, 126, 234, 0.2);
    --tag-noun-text: #667eea;
    --tag-verb-bg: rgba(74, 222, 128, 0.2);
    --tag-verb-text: #4ade80;
    --tag-adj-bg: rgba(251, 191, 36, 0.2);
    --tag-adj-text: #fbbf24;
    --tag-adv-bg: rgba(168, 85, 247, 0.2);
    --tag-adv-text: #a855f7;
    --tag-other-bg: rgba(236, 72, 153, 0.2);
    --tag-other-text: #ec4899;
  }

  /* Light mode overrides */
  body.light-mode {
    --bg-gradient-start: #f5f2eb;
    --bg-gradient-end: #f5f2eb;
    --text-primary: #000000;
    --text-secondary: #1a1a18;
    --text-muted: #3a3a38;
    --accent-primary: #c84b1f;
    --accent-secondary: #2563a8;
    --card-bg: #fffef9;
    --card-border: #d8d4ca;
    --card-hover-bg: rgba(200, 75, 31, 0.05);
    --input-bg: #ffffff;
    --input-border: #d8d4ca;
    --table-header-bg: rgba(200, 75, 31, 0.08);
    --table-row-even: rgba(107, 104, 96, 0.03);
    --table-border: #d8d4ca;
    --shadow-color: rgba(0, 0, 0, 0.1);

    /* POS badge colors - light mode (from reference) */
    --tag-noun-bg: #dbeafe;
    --tag-noun-text: #1e40af;
    --tag-verb-bg: #dcfce7;
    --tag-verb-text: #166534;
    --tag-adj-bg: #fef3c7;
    --tag-adj-text: #92400e;
    --tag-adv-bg: #f3e8ff;
    --tag-adv-text: #6b21a8;
    --tag-other-bg: #fce7f3;
    --tag-other-text: #9d174d;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-primary);
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    padding: 20px;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Light mode font override */
  body.light-mode {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    margin: 20px 0 30px;
    padding: 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 10px 30px var(--shadow-color);
    position: relative;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 1rem;
    opacity: 0.9;
  }

  /* Theme Toggle Button */
  .theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 25px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-weight: 500;
  }

  .theme-toggle:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  .theme-toggle:active {
    transform: scale(0.95);
  }

  /* Home Button */
  .home-button {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 25px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-weight: 500;
    text-decoration: none;
  }

  .home-button:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  .home-button:active {
    transform: scale(0.95);
  }

  .section {
    margin-bottom: 3rem;
  }

  h2 {
    color: var(--accent-primary);
    font-size: 1.5rem;
    margin: 30px 0 20px 0;
    padding: 15px 20px;
    background: var(--card-bg);
    border-left: 5px solid var(--accent-primary);
    border-radius: 5px;
    backdrop-filter: blur(10px);
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 10px 30px var(--shadow-color);
  }

  .stat {
    display: flex;
    flex-direction: column;
    min-width: 120px;
  }

  .stat .val {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-primary);
    font-family: 'Courier New', monospace;
  }

  .stat .lbl {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .controls input,
  .controls select {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    border-radius: 8px;
    color: var(--text-primary);
    transition: all 0.3s ease;
  }

  .controls input {
    flex: 1;
    min-width: 250px;
  }

  .controls input:focus,
  .controls select:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .controls input::placeholder {
    color: var(--text-muted);
  }

  .controls select {
    min-width: 180px;
    cursor: pointer;
  }

  body.light-mode .controls select option {
    background: white;
    color: #1a1a2e;
  }

  body:not(.light-mode) .controls select option {
    background: #1a1a2e;
    color: #e0e0e0;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    box-shadow: 0 10px 30px var(--shadow-color);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }

  thead tr {
    background: var(--table-header-bg);
    border-bottom: 2px solid var(--accent-primary);
  }

  thead th {
    padding: 1rem 1.25rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent-primary);
  }

  tbody tr {
    border-bottom: 1px solid var(--table-border);
    transition: background 0.2s ease;
  }

  tbody tr:nth-child(even) {
    background: var(--table-row-even);
  }

  tbody tr:hover {
    background: var(--card-hover-bg);
  }

  td {
    padding: 0.85rem 1.25rem;
    vertical-align: top;
  }

  td:first-child {
    font-weight: 600;
    color: var(--accent-secondary);
    font-family: 'Courier New', monospace;
    font-size: 1rem;
  }

  /* Badges */
  .pos-badge {
    display: inline-block;
    font-size: 0.75rem;
    font-family: 'Courier New', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
  }

  .pos-noun {
    background: var(--tag-noun-bg);
    color: var(--tag-noun-text);
    border: 1px solid var(--tag-noun-text);
  }

  .pos-verb {
    background: var(--tag-verb-bg);
    color: var(--tag-verb-text);
    border: 1px solid var(--tag-verb-text);
  }

  .pos-adj {
    background: var(--tag-adj-bg);
    color: var(--tag-adj-text);
    border: 1px solid var(--tag-adj-text);
  }

  .pos-adv {
    background: var(--tag-adv-bg);
    color: var(--tag-adv-text);
    border: 1px solid var(--tag-adv-text);
  }

  .pos-other {
    background: var(--tag-other-bg);
    color: var(--tag-other-text);
    border: 1px solid var(--tag-other-text);
  }

  .cluster-badge {
    font-size: 0.75rem;
    font-family: 'Courier New', monospace;
    color: var(--text-secondary);
    background: var(--card-hover-bg);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
  }

  /* Cluster Cards */
  .cluster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .cluster-card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 1.25rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px var(--shadow-color);
  }

  .cluster-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px var(--shadow-color);
    border-color: rgba(102, 126, 234, 0.3);
  }

  .cluster-card .cluster-id {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent-secondary);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cluster-card .cluster-label {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
  }

  .cluster-card .words {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--text-secondary);
    word-break: break-word;
    line-height: 1.6;
  }

  /* Mobile Card Layout for Table */
  @media (max-width: 768px) {
    header {
      padding: 20px 15px;
    }

    header h1 {
      font-size: 1.5rem;
      padding: 0 70px;
    }

    header p {
      font-size: 0.85rem;
    }

    .theme-toggle,
    .home-button {
      padding: 6px 10px;
      font-size: 1rem;
      top: 15px;
    }

    .theme-toggle {
      right: 15px;
    }

    .home-button {
      left: 15px;
    }

    .theme-toggle span:last-child,
    .home-button span:last-child {
      display: none;
    }
    }

    .theme-toggle {
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      font-size: 1rem;
    }

    .controls {
      flex-direction: column;
    }

    .controls input,
    .controls select {
      width: 100%;
      min-width: 100%;
    }

    .stats-bar {
      gap: 1rem;
    }

    .stat {
      min-width: 100px;
    }

    .stat .val {
      font-size: 1.5rem;
    }

    .cluster-grid {
      grid-template-columns: 1fr;
    }

    /* Convert table to cards on mobile */
    .table-wrap {
      overflow-x: visible;
    }

    table {
      display: block;
    }

    thead {
      display: none;
    }

    tbody {
      display: block;
    }

    tbody tr {
      display: block;
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border);
      border-radius: 10px;
    }

    tbody tr:hover {
      background: var(--card-hover-bg) !important;
    }

    td {
      display: block;
      padding: 0.4rem 0;
      text-align: left;
    }

    td:first-child {
      font-size: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 0.6rem;
    }

    td:before {
      content: attr(data-label);
      font-weight: 600;
      color: var(--accent-primary);
      display: inline-block;
      width: 90px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td:first-child:before {
      display: none;
    }
  }
  }

  .hidden {
    display: none !important;
  }
</style>
</head>

// ══════════════════════════════════════════════════════════════════════════════
// RENDER TABLE
// ══════════════════════════════════════════════════════════════════════════════
const POS_CLASS = {
  noun: 'pos-noun',
  verb: 'pos-verb',
  adj: 'pos-adj',
  adv: 'pos-adv',
  other: 'pos-other'
};

const tbody = document.getElementById('tableBody');
const clusterSelect = document.getElementById('clusterFilter');

// Populate cluster filter dropdown
const clusterSet = [...new Set(WORDS.map(w => w[3]))].sort();
clusterSet.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = (CLUSTER_META[c] || c);
  clusterSelect.appendChild(opt);
});

function renderTable(filtered) {
  tbody.innerHTML = '';
  filtered.forEach(([dutch, eng, pos, cluster]) => {
    const tr = document.createElement('tr');
    tr.dataset.cluster = cluster;
    tr.dataset.pos = pos;
    const clusterLabel = CLUSTER_META[cluster] || cluster;
    tr.innerHTML = `
      <td>${dutch}</td>
      <td data-label="English:">${eng}</td>
      <td data-label="POS:"><span class="pos-badge ${POS_CLASS[pos] || 'pos-other'}">${pos}</span></td>
      <td data-label="Cluster:"><span class="cluster-badge">${clusterLabel}</span></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('visibleCount').textContent = filtered.length;
}

// Initial render
renderTable(WORDS);

// ══════════════════════════════════════════════════════════════════════════════
// SEARCH & FILTER
// ══════════════════════════════════════════════════════════════════════════════
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const pos = document.getElementById('posFilter').value;
  const cluster = document.getElementById('clusterFilter').value;
  
  const filtered = WORDS.filter(([dutch, eng, p, c]) => {
    const matchQ = !q || dutch.toLowerCase().includes(q) || eng.toLowerCase().includes(q);
    const matchPos = !pos || p === pos;
    const matchCluster = !cluster || c === cluster;
    return matchQ && matchPos && matchCluster;
  });
  
  renderTable(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('posFilter').addEventListener('change', applyFilters);
document.getElementById('clusterFilter').addEventListener('change', applyFilters);

// ══════════════════════════════════════════════════════════════════════════════
// RENDER CLUSTER CARDS
// ══════════════════════════════════════════════════════════════════════════════
const clusterMap = {};
WORDS.forEach(([dutch, , , cluster]) => {
  if (!clusterMap[cluster]) clusterMap[cluster] = [];
  clusterMap[cluster].push(dutch);
});

const clusterGrid = document.getElementById('clusterGrid');
Object.entries(clusterMap)
  .sort((a, b) => (CLUSTER_META[a[0]] || a[0]).localeCompare(CLUSTER_META[b[0]] || b[0]))
  .forEach(([id, words]) => {
    const card = document.createElement('div');
    card.className = 'cluster-card';
    card.innerHTML = `
      <div class="cluster-id">${id}</div>
      <div class="cluster-label">
        ${CLUSTER_META[id] || id}
        <span style="color:#888;font-weight:400">(${words.length})</span>
      </div>
      <div class="words">${words.join(' · ')}</div>
    `;
    clusterGrid.appendChild(card);
  });

</script>
